name: chocolatine
on:
    push:
        branches-ignore:
            - 'ga-ignore-*'
    pull_request:
        branches-ignore:
            - 'ga-ignore-*'

env:
    MIRROR_URL: "git@github.com:EpitechPGE1-2025/G-DOP-200-COT-2-1-chocolatine-37.git"
    EXECUTABLES: "binary1,binary2"

jobs:
    check_coding_style:
        runs-on: ubuntu-latest
        container: ghcr.io/epitech/coding-style-checker:latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
            - name: Coding style checker
              run: |
                check.sh $(pwd) $(pwd)
                if [ -s coding-style-reports.log ]; then
                  while IFS= read -r line; do
                    file=$(echo "$line" | cut -d':' -f1)
                    line_nb=$(echo "$line" | cut -d':' -f2)
                    type=$(echo "$line" | cut -d':' -f3)
                    code=$(echo "$line" | cut -d':' -f4)
                    echo "::error file=$file,line=$line_nb,title=$type coding style error::$code"
                  done < coding-style-reports.log
                exit 1
                fi
                echo "No coding style errors found!"
    check_program_compilation:
        needs: [check_coding_style]
        runs-on: ubuntu-latest
        container: epitechcontent/epitest-docker:latest
        env:
          CC: epiclang
        steps:
            - uses: actions/checkout@v4
            - name: Buil project
              run: make
            - name: Clean project
              run: make clean
            - name: Verify executables
              run: |
                IFS=',' read -ra ADDR <<< "$EXECUTABLES"
                for i in "${ADDR[@]}"; do
                    if [ ! -x "$i" ]; then
                        echo "Executable $i not found or not executable"
                        exit 1
                    fi
                done
    run_tests:
        needs: [check_program_compilation]
        runs-on: ubuntu-latest
        container: epitechcontent/epitest-docker:latest
        steps:
          - uses: actions/checkout@v4
          - name: Run unit tests
            run: make tests_run
            timeout-minutes: 2
    push_to_mirror:
        needs: [run_tests]
        if: github.event_name == 'push'
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
            with:
              fetch-depth: 0
          - name: Mirroring to Epitech repository
            uses: pixta-dev/repository-mirroring-action@v1
            with:
              target_repo_url: ${{ env.MIRROR_URL }}
              ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}
