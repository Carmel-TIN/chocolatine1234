name: chocolatine
on:
    push:
        branches-ignore:
            - 'no-ga/**'
    pull_request:
        branches-ignore:
            - 'no-ga/**'

env:
    MIRROR_URL: "git@github.com:EpitechPGE1-2025/G-DOP-200-COT-2-1-chocolatine-37.git"
    EXECUTABLES: "101pong"

jobs:
    check_compilation_and_coding_style:
        name: check compilation and coding style
        if: github.event.repository.ssh_url != env.MIRROR_URL
        runs-on: ubuntu-latest
        container: epitechcontent/epitest-docker:latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
            - name: Coding style checker
              run: |
                banana-check-repo .
                if [ -s coding-style-reports.log ]; then
                  while IFS= read -r line; do
                    file=$(echo "$line" | cut -d':' -f1)
                    line_nb=$(echo "$line" | cut -d':' -f2)
                    type=$(echo "$line" | cut -d':' -f3)
                    code=$(echo "$line" | cut -d':' -f4)
                    echo "::error file=$file,line=$line_nb,title=$type coding style error::$code"
                  done < coding-style-reports.log
                exit 1
                fi
            - name: Launch make
              run: make
              env:
                CC: epiclang
              timeout-minutes: 2
            - name: Launch make clean
              run: make clean
            - name: Verify executables
              run: |
                IFS=',' read -ra ADDR <<< "$EXECUTABLES"
                for i in "${ADDR[@]}"; do
                    if [ ! -x "$i" ]; then
                        echo "Executable $i not found or not executable"
                        exit 1
                    fi
                done
    run_tests:
        name: Run unit tests
        needs: [check_compilation_and_coding_style]
        runs-on: ubuntu-latest
        container: epitechcontent/epitest-docker:latest
        steps:
          - name: Checkout repository
            uses: actions/checkout@v4
          - name: Launch make tests_run
            run: make tests_run
            timeout-minutes: 2
    push_to_mirror:
        name: Push to mirror repository
        needs: [run_tests]
        if: github.event_name == 'push'
        runs-on: ubuntu-latest
        steps:
          - name: Checkout repository (full history)
            uses: actions/checkout@v4
            with:
              fetch-depth: 0
          - name: Mirroring to Epitech repository
            uses: pixta-dev/repository-mirroring-action@v1
            with:
              target_repo_url: ${{ env.MIRROR_URL }}
              ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}
