name: chocolatine
on:
    push:
        branches-ignore:
            - 'no-ga/**'
    pull_request:
        branches-ignore:
            - 'no-ga/**'

env:
    MIRROR_SSH_URL: "git@github.com:Carmel-TIN/chocolatine1234.git"
    EXECUTABLES: "mysh"

jobs:
    check_compilation_and_coding_style:
        name: check compilation and coding style
        runs-on: ubuntu-latest
        container: epitechcontent/epitest-docker:latest
        steps:
            - name: Check mirroring
              if: ${{ !contains(env.MIRROR_SSH_URL, github.repository) }}
              run: echo "Possible mirroring"
            - name: Checkout repository
              uses: actions/checkout@v4
            - name: Coding style checker
              run: |
                banana-check-repo . > coding-style-reports.log 2>&1 || true
                if [ -s coding-style-reports.log ]; then
                  while IFS= read -r line; do
                    FILE=$(echo "$line" | cut -d':' -f1)
                    LINE=$(echo "$line" | cut -d':' -f2)
                    TYPE=$(echo "$line" | cut -d':' -f3)
                    CODE=$(echo "$line" | cut -d':' -f4)
                    echo "::error file=$FILE,line=$LINE,title=$TYPE coding style error::$CODE"
                  done < coding-style-reports.log
                  exit 1
                fi
            - name: Launch make
              run: make
              env:
                CC: epiclang
              timeout-minutes: 2
            - name: Launch make clean
              run: make clean
            - name: Verify executables
              run: |
                for binary in $(echo $EXECUTABLES | tr ',' ' '); do
                  if [ ! -x "$binary" ]; then
                    echo "::error file=$binary,title=Binary Error::Executable '$binary' missing or not executable"
                    exit 1
                  fi
                done
    run_tests:
        name: Run unit tests
        needs: [check_compilation_and_coding_style]
        runs-on: ubuntu-latest
        container: epitechcontent/epitest-docker:latest
        steps:
          - name: Checkout repository
            uses: actions/checkout@v4
          - name: Launch make tests_run
            run: make tests_run
            timeout-minutes: 2
    push_to_mirror:
        name: Push to mirror repository
        needs: [run_tests]
        if: github.event_name == 'push'
        runs-on: ubuntu-latest
        steps:
          - name: Checkout repository (full history)
            uses: actions/checkout@v4
            with:
              fetch-depth: 0
          - name: Mirroring to Epitech repository
            uses: pixta-dev/repository-mirroring-action@v1
            with:
              target_repo_url: ${{ env.MIRROR_SSH_URL }}
              ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}
